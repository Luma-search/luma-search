<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden – Luma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0f0f11;
            --surface:  #1a1a1e;
            --surface2: #242428;
            --border:   #35353a;
            --text:     #ededef;
            --muted:    #888898;
            --accent:   #C29A40;
            --negative: #f44336;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .blob { position: fixed; border-radius: 50%; filter: blur(90px); z-index: -1; pointer-events: none; }
        .blob-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(194,154,64,0.08) 0%, transparent 70%); top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(123,167,247,0.06) 0%, transparent 70%); bottom: -150px; right: -150px; }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 44px 40px 36px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.3);
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            color: var(--text);
            text-decoration: none;
            display: block;
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--accent); }

        .card-title {
            text-align: center;
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        /* Alert */
        .alert {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            padding: 11px 13px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .alert-error { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.3); color: #f44336; }
        .alert-icon  { flex-shrink: 0; margin-top: 1px; font-style: normal; }
        .alert.hidden { display: none; }

        /* Form */
        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 7px;
            letter-spacing: 0.02em;
        }

        .input-wrap { position: relative; }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 13px 14px;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 11px;
            color: var(--text);
            font-size: 14.5px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(194,154,64,0.12);
        }
        input.has-eye { padding-right: 46px; }

        /* Eye button */
        .eye-btn {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 5px;
            line-height: 0;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }
        .eye-btn:hover  { color: var(--text); background: rgba(255,255,255,0.05); }
        .eye-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
        .eye-btn svg { display: block; }

        /* Remember me */
        .check-row { margin-bottom: 22px; }

        .check-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13.5px;
            color: var(--muted);
            user-select: none;
            transition: color 0.15s;
        }
        .check-label:hover { color: var(--text); }

        .check-label input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .check-box {
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 1.5px solid var(--border);
            border-radius: 5px;
            background: var(--surface2);
            position: relative;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        .check-box::after {
            content: '';
            position: absolute;
            display: none;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 9px;
            border: 2px solid #111;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }
        .check-label input:checked ~ .check-box {
            background: var(--accent);
            border-color: var(--accent);
        }
        .check-label input:checked ~ .check-box::after { display: block; }
        .check-label input:focus-visible ~ .check-box  { box-shadow: 0 0 0 3px rgba(194,154,64,0.3); }

        .check-note { font-size: 11.5px; opacity: 0.55; }

        /* Submit */
        .btn-submit {
            width: 100%;
            padding: 13.5px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 11px;
            font-weight: 600;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.01em;
        }
        .btn-submit:hover:not(:disabled)  { opacity: 0.88; }
        .btn-submit:active:not(:disabled) { transform: scale(0.99); }
        .btn-submit:disabled { opacity: 0.55; cursor: default; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.25);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner.hidden { display: none; }

        .divider { border: none; border-top: 1px solid var(--border); margin: 26px 0; }

        .sub-text {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .sub-text a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .sub-text a:hover { text-decoration: underline; }

        .back-link {
            display: block;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <a href="/" class="logo">L<span>u</span>ma</a>
        <p class="card-title">Melde dich bei deinem Konto an</p>

        <div class="alert alert-error hidden" id="error-msg" role="alert" aria-live="polite">
            <em class="alert-icon">⚠</em>
            <span id="error-text"></span>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" required placeholder="name@beispiel.de"
                       autocomplete="email" inputmode="email">
            </div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <div class="input-wrap">
                    <input class="has-eye" type="password" id="password" required
                           placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="eye-btn" id="eye-pw"
                            onclick="togglePw('password','eye-pw')"
                            tabindex="-1" aria-label="Passwort anzeigen">
                        <svg id="icon-eye-pw" width="17" height="17" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="check-row">
                <label class="check-label">
                    <input type="checkbox" id="remember-me" autocomplete="off">
                    <span class="check-box"></span>
                    Angemeldet bleiben
                    <span class="check-note">(5 Tage)</span>
                </label>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
                <span class="spinner hidden" id="spinner"></span>
                <span id="btn-text">Anmelden</span>
            </button>
        </form>

        <hr class="divider">

        <p class="sub-text">
            Noch kein Konto? <a href="/register.html">Jetzt registrieren</a>
        </p>
        <a href="/" class="back-link">← Zurück zur Suche</a>
    </div>

    <script>
        const SVG_EYE = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const SVG_EYE_OFF = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

        const params   = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect') || '/';

        function togglePw(inputId, btnId) {
            const input = document.getElementById(inputId);
            const btn   = document.getElementById(btnId);
            const show  = input.type === 'password';
            input.type  = show ? 'text' : 'password';
            btn.innerHTML = show ? SVG_EYE_OFF : SVG_EYE;
            btn.setAttribute('aria-label', show ? 'Passwort verbergen' : 'Passwort anzeigen');
        }

        function showError(msg) {
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-msg').classList.remove('hidden');
        }
        function hideError() {
            document.getElementById('error-msg').classList.add('hidden');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const btn      = document.getElementById('btn-submit');
            const spinner  = document.getElementById('spinner');
            const btnText  = document.getElementById('btn-text');

            btn.disabled        = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Anmelden…';

            const email      = document.getElementById('email').value.trim();
            const password   = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;

            try {
                const res  = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, password, rememberMe })
                });
                const data = await res.json();

                if (data.success) {
                    btnText.textContent = 'Erfolgreich ✓';
                    spinner.classList.add('hidden');
                    setTimeout(() => { window.location.href = redirect; }, 400);
                } else {
                    showError(data.error || 'Anmeldung fehlgeschlagen.');
                    btn.disabled        = false;
                    spinner.classList.add('hidden');
                    btnText.textContent = 'Anmelden';
                }
            } catch {
                showError('Verbindungsfehler. Bitte erneut versuchen.');
                btn.disabled        = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Anmelden';
            }
        });

        ['email', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('input', hideError);
        });
    </script>
</body>
</html>
