<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keine Verbindung – Luma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0f0f11;
            --surface:  #1a1a1e;
            --text:     #ededef;
            --muted:    #888898;
            --accent:   #C29A40;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at top, #212125, var(--bg) 60%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container { max-width: 500px; }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text);
        }

        p {
            color: var(--muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--muted);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡</h1>
        <h2>Keine Verbindung</h2>
        <p>Du bist offline. Überprüfe deine Internetverbindung und versuche es erneut.</p>
        <button class="btn" onclick="window.location.reload()">Erneut versuchen</button>
    </div>
</body>
</html>
