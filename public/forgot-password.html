<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort vergessen – Luma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0f0f11;
            --surface:  #1a1a1e;
            --surface2: #242428;
            --border:   #35353a;
            --text:     #ededef;
            --muted:    #888898;
            --accent:   #C29A40;
            --negative: #f44336;
            --positive: #4caf50;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text);
            text-decoration: none;
            display: block;
        }
        .logo span { color: var(--accent); }

        h2 { text-align: center; font-size: 1.2rem; margin-bottom: 10px; }
        p { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
        input {
            width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 12px; background: var(--accent); color: #000; border: none;
            border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--muted); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--text); }

        .alert {
            padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; display: none; text-align: center;
        }
        .alert.error { background: rgba(244,67,54,0.1); color: var(--negative); border: 1px solid rgba(244,67,54,0.3); }
        .alert.success { background: rgba(76,175,80,0.1); color: var(--positive); border: 1px solid rgba(76,175,80,0.3); }
    </style>
</head>
<body>
    <div class="card">
        <a href="/" class="logo">L<span>u</span>ma</a>
        <h2>Passwort zurücksetzen</h2>
        <p>Gib deine E-Mail-Adresse ein. Wir senden dir einen Link, um dein Passwort zurückzusetzen.</p>

        <div id="msg" class="alert"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" required placeholder="name@beispiel.de">
            </div>
            <button type="submit" class="btn" id="submitBtn">Link senden</button>
        </form>

        <a href="/login.html" class="back-link">Zurück zur Anmeldung</a>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('msg');

            btn.disabled = true;
            btn.textContent = 'Sende...';
            msg.style.display = 'none';

            try {
                // Simulierter API-Call (da Backend-Route evtl. noch fehlt)
                // Falls du die Route später baust: fetch('/api/auth/reset-request', ...)
                await new Promise(r => setTimeout(r, 1500));
                
                // Wir tun so, als ob es geklappt hat (Sicherheits-Best-Practice: Immer Erfolg anzeigen)
                msg.textContent = 'Falls ein Konto mit dieser E-Mail existiert, haben wir einen Link gesendet.';
                msg.className = 'alert success';
                msg.style.display = 'block';
                document.getElementById('resetForm').reset();
            } catch (err) {
                msg.textContent = 'Ein Fehler ist aufgetreten.';
                msg.className = 'alert error';
                msg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Link senden';
            }
        });
    </script>
</body>
</html>
