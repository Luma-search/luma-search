<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite nicht gefunden – Luma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0f0f11;
            --surface:  #1a1a1e;
            --border:   #35353a;
            --text:     #ededef;
            --muted:    #888898;
            --accent:   #C29A40;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at top, #212125, var(--bg) 60%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: clamp(4rem, 10vw, 6rem);
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--accent), #e7c375);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text);
        }

        p {
            color: var(--muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Seite nicht gefunden</h2>
        <p>Die Seite, die du suchst, existiert nicht oder wurde verschoben. Vielleicht hast du dich auch nur vertippt?</p>
        <a href="/" class="btn">Zurück zur Startseite</a>
    </div>
</body>
</html>
